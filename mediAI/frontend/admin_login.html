<!DOCTYPE html>
<html lang="en">
<head>
<script src="config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediAI - Admin Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(rgba(15, 5, 10, 0.88), rgba(15, 5, 10, 0.88)), url("pink_neon_medical.png");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 25px 60px;
        width: 100%;
    }

    nav h1 {
        color: #ff007f;
        font-size: 38px;
        text-shadow: 0 0 10px #ff007f, 0 0 30px #ff007f;
    }

    nav ul {
        display: flex;
        list-style: none;
        gap: 35px;
    }

    nav ul li {
        cursor: pointer;
    }

    nav ul li a {
        color: white;
        text-decoration: none;
        transition: .3s;
    }

    nav ul li a:hover {
        color: #ff007f;
    }

    nav ul li a.active {
        color: #ff007f;
        font-weight: bold;
    }

    nav ul li a.login-link {
        color: #ff007f;
        font-weight: bold;
        border: 1px solid #ff007f;
        padding: 8px 18px;
        border-radius: 20px;
        text-shadow: 0 0 5px rgba(255, 0, 127, 0.5);
        box-shadow: 0 0 5px rgba(255, 0, 127, 0.2);
    }

    nav ul li a.login-link:hover {
        background: #ff007f;
        color: black;
        text-shadow: none;
        box-shadow: 0 0 15px #ff007f;
    }

    .login-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding-bottom: 40px;
    }

    .login-box {
        width: 420px;
        padding: 40px;
        background: rgba(255, 255, 255, .04);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        border: 1px solid rgba(255, 0, 127, 0.3);
        box-shadow: 0 0 30px rgba(255, 0, 127, 0.45);
        text-align: center;
        transition: 0.3s;
    }

    .login-box h1 {
        font-size: 32px;
        color: white;
        margin-bottom: 10px;
        text-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
    }

    .login-box h3 {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 400;
        margin-bottom: 30px;
    }

    .login-box input {
        width: 100%;
        padding: 14px 20px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 30px;
        outline: none;
        color: white;
        font-size: 15px;
        margin-bottom: 20px;
        transition: 0.3s;
    }

    .login-box input::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }

    .login-box input:focus {
        border-color: #ff007f;
        box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        background: rgba(255, 255, 255, 0.08);
    }

    .login-box button {
        width: 100%;
        padding: 14px 20px;
        background: #ff007f;
        border: none;
        border-radius: 30px;
        color: black;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .login-box button:hover {
        box-shadow: 0 0 20px #ff007f;
        transform: translateY(-2px);
    }

    .login-box button:active {
        transform: translateY(0);
    }
</style>
</head>
<body>

<nav>
    <h1>MediAI Admin</h1>
    <ul>
        <li><a href="home.html#hero-section">Home</a></li>
        <li><a href="home.html#reports-section">Reports</a></li>
        <li><a href="home.html#contact-section">Contact & Feedback</a></li>
        <li><a href="admin_login.html" class="login-link active">Admin Portal</a></li>
    </ul>
</nav>

<div class="login-container">
    <div class="login-box">
        <h1 style="color: #ff007f; text-shadow: 0 0 10px #ff007f;">MediAI Admin</h1>
        <h3 id="formTitle">Healthcare Management System - Admin Login</h3>

        <form id="adminLoginForm">
            <input type="email" id="email" placeholder="Admin Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            
            <button type="submit" id="submitBtn">Login as Administrator</button>
            <p style="margin-top: 25px; font-size: 14px;"><a href="home.html" style="color: #ff007f; text-decoration: none; font-weight: 500;">View Features & Capabilities →</a></p>
            <p style="margin-top: 25px; font-size: 13px; color: rgba(255, 255, 255, 0.5); font-weight: 300;">Developed by <span style="color: #ff007f; font-weight: 600; text-shadow: 0 0 5px rgba(255, 0, 127, 0.3);">Sudarson, B.Tech AI & DS</span></p>
            <div class="dev-links" style="margin-top: 10px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
                <a href="mailto:sudarsonbalu@gmail.com" title="sudarsonbalu@gmail.com" style="color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: 0.3s;"><i class="fa-solid fa-envelope"></i></a>
                <a href="tel:9361138890" title="+91 9361138890" style="color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: 0.3s;"><i class="fa-solid fa-phone"></i></a>
                <a href="https://www.linkedin.com/in/sudarson-balu-8110a1308" target="_blank" title="LinkedIn" style="color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: 0.3s;"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://github.com/Sudarsonbalu" target="_blank" title="GitHub" style="color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: 0.3s;"><i class="fa-brands fa-github"></i></a>
            </div>
        </form>
    </div>
</div>

<script>
    const API_URL = window.API_URL || "http://127.0.0.1:8002";

    document.addEventListener("DOMContentLoaded", () => {
        // Redirection check if already logged in as Admin
        const userStr = localStorage.getItem("user");
        const token = localStorage.getItem("token");
        if (userStr && token) {
            try {
                const user = JSON.parse(userStr);
                if (user && user.role && user.role.toLowerCase() === "admin") {
                    window.location.href = "admin_analytics.html";
                }
            } catch (e) {
                console.error("Session parse error on load:", e);
            }
        }

        const form = document.getElementById("adminLoginForm");
        const formTitle = document.getElementById("formTitle");

        function showMessage(msg, isError = false) {
            formTitle.innerHTML = `<span style="color: ${isError ? '#ff4d4d' : '#2ecc71'}; font-weight: 500;">${msg}</span>`;
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                showMessage("Authenticating admin...", false);
                const response = await fetch(`${API_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Enforce that only admins can login here
                    if (data.user && data.user.role && data.user.role.toLowerCase() === "admin") {
                        localStorage.setItem("user", JSON.stringify(data.user));
                        if (data.token) {
                            localStorage.setItem("token", data.token);
                        }
                        showMessage("Login successful! Redirecting...", false);
                        setTimeout(() => {
                            window.location.href = "admin_analytics.html";
                        }, 800);
                    } else {
                        showMessage("Access Denied: You do not have administrator privileges.", true);
                    }
                } else {
                    const err = await response.json();
                    showMessage("Login failed: " + (err.detail || "Invalid credentials"), true);
                }
            } catch (err) {
                console.error("Login error:", err);
                showMessage("Failed to connect to backend server.", true);
            }
        });
    });
</script>

</body>
</html>
