version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mediai_mysql
    restart: always
    environment:
      MYSQL_DATABASE: mediai
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediai_web
    restart: always
    ports:
      - "8002:8002"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=mediai

volumes:
  mysql_data:
